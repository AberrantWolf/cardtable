<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>cardtable — spatial tabs prototype</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="table">
    <div id="world">
      <svg id="groups" width="40000" height="40000" style="position:absolute; left:-20000px; top:-20000px; overflow:visible;">
        <defs>
          <!-- gives every group stroke a hand-drawn wobble -->
          <filter id="chalk" x="-20%" y="-20%" width="140%" height="140%">
            <feTurbulence type="fractalNoise" baseFrequency="0.014" numOctaves="2" seed="7" result="n" />
            <feDisplacementMap in="SourceGraphic" in2="n" scale="7" xChannelSelector="R" yChannelSelector="G" />
          </filter>
        </defs>
        <g id="group-paths" filter="url(#chalk)"></g>
      </svg>
      <div id="cards"></div>
    </div>
    <div id="labels"></div>
  </div>

  <div id="bar">
    <button id="btn-open">+ open tab</button>
    <button id="btn-fit">fit</button>
    <button id="btn-reset">reset</button>
  </div>

  <div id="trash">🗑</div>
  <div id="hand"></div>
  <div id="hint">drag table = pan · wheel = zoom · double-click a card = note<br>drag a hand card onto the table to place · drop on 🗑 to discard</div>

  <script type="module" src="app.js"></script>
</body>
</html>
