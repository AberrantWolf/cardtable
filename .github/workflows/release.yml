name: Release

# Cut a release by pushing a version tag, e.g. `git tag v1.0.0 && git push origin v1.0.0`.
# Tags must be store-legal numeric versions - Chrome accepts only 1-4 dot-separated
# integers (no `-rc`/letters). For pre-1.0 release candidates use 0.x tags (e.g. v0.9.0,
# v0.9.1): they sort below v1.0.0 and are auto-marked as GitHub pre-releases. (A 4th
# component like v1.2.0.1 is also treated as a pre-release, for post-1.0 build candidates.)
on:
  push:
    tags: ["v*"]

permissions:
  contents: write          # needed to create/update the GitHub Release

jobs:
  build:
    name: Build and submit
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      prerelease: ${{ steps.version.outputs.prerelease }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Resolve version from tag
        id: version
        run: |
          version="${GITHUB_REF_NAME#v}"
          if [[ ! "$version" =~ ^[0-9]+(\.[0-9]+){0,3}$ ]]; then
            echo "::error::Tag '$GITHUB_REF_NAME' -> version '$version' is not store-legal. Chrome requires 1-4 dot-separated integers, e.g. v1.0.0 or v1.0.0.1 (RC)."
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "CARDTABLE_VERSION=$version" >> "$GITHUB_ENV"
          if [[ "$version" =~ ^0\. || "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and lint
        run: npm run lint          # CARDTABLE_VERSION (from $GITHUB_ENV) stamps both manifests

      - name: Package Chromium zip
        run: |
          cd extension/dist/chromium
          zip -r -X "$GITHUB_WORKSPACE/cardtable-chromium-$CARDTABLE_VERSION.zip" .

      - name: Upload Chromium zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: cardtable-chromium-${{ steps.version.outputs.version }}
          path: cardtable-chromium-${{ steps.version.outputs.version }}.zip
          if-no-files-found: error

      # AMO versions are unique across channels, so RC/test tags must not consume
      # a version on the production add-on ID.
      - name: Submit Firefox release to AMO
        if: steps.version.outputs.prerelease == 'false'
        env:
          WEB_EXT_API_KEY: ${{ secrets.AMO_API_KEY }}
          WEB_EXT_API_SECRET: ${{ secrets.AMO_API_SECRET }}
        run: |
          npx web-ext sign \
            --source-dir=extension/dist/firefox \
            --channel=listed \
            --amo-metadata=extension/amo-metadata.json \
            --approval-timeout=0

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    env:
      CARDTABLE_VERSION: ${{ needs.build.outputs.version }}
      PRERELEASE: ${{ needs.build.outputs.prerelease }}
    steps:
      - name: Download Chromium zip artifact
        uses: actions/download-artifact@v4
        with:
          name: cardtable-chromium-${{ needs.build.outputs.version }}
          path: release-artifacts

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          # The publish job has no checkout, so `gh` can't infer the repo from a
          # local git remote (it would fail: "not a git repository"). Point it at
          # the repo explicitly so release view/create/upload work without one.
          GH_REPO: ${{ github.repository }}
        run: |
          flags=()
          if [ "$PRERELEASE" = "true" ]; then flags+=(--prerelease); fi

          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            echo "Release $GITHUB_REF_NAME already exists; uploading assets."
          else
            gh release create "$GITHUB_REF_NAME" \
              --title "cardtable $CARDTABLE_VERSION" \
              --generate-notes \
              "${flags[@]}"
          fi

          gh release upload "$GITHUB_REF_NAME" \
            "release-artifacts/cardtable-chromium-$CARDTABLE_VERSION.zip" \
            --clobber
